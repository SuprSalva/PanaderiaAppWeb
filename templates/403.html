{% extends "layout.html" %}

{% block container %}
{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/403.css') }}">
{% endblock %}

<div class="err-wrap">
  <div class="err-code">403</div>
  <div class="err-icon">🔒</div>
  <div class="err-title">Acceso denegado</div>
  <p class="err-msg">No tienes permiso para ver esta sección.<br>Si crees que esto es un error, contacta al
    administrador.</p>
  <a href="{{ url_volver }}" class="btn btn-primary" style="margin-top:8px">
    ← Volver
  </a>
</div>
{% endblock %}
