<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Error 404 - Página no encontrada</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/404.css') }}">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="error-page">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <div class="error-container">
            <span class="error-icon">🥐</span>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">¡Ups! Nos comimos esta página</h2>
            <p class="error-msg">
                Parece que la página que buscas no existe, ha cambiado de lugar o el panadero se la llevó. ¿Qué te
                parece si
                volvemos al inicio?
            </p>
            <a href="{{ url_for('login') }}" class="btn-home">
                <span>🏠 Volver al inicio</span>
            </a>
        </div>
    </div>
</body>

</html>
