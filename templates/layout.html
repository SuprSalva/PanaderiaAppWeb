<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulce Migaja</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    {% if request.endpoint not in ['login', 'entrar', 'registrar_usuario'] %}
    <nav class="bg-white border-gray-200 px-2 sm:px-4 py-2.5 rounded-sm dark:bg-gray-800 border-b">
        <div class="container flex flex-wrap items-center justify-between mx-auto">
            <a href="{{url_for('dashboard')}}" class="flex items-center">
                <span class="self-center text-xl font-bold whitespace-nowrap dark:text-white">Dulce Migaja</span>
            </a>
            <div class="flex md:order-2">
                <a href="{{url_for('login')}}" class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5">Salir</a>
            </div>
        </div>
    </nav>
   {% endif %}

    <div class="container mx-auto p-4 mb-20">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="p-4 mb-4 text-sm text-blue-800 rounded-lg bg-blue-50 dark:bg-gray-800 dark:text-blue-400" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
       
        {% block container %}
        {% endblock %}
    </div>

 
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>
</html>
